services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --reload --reload-dir api --reload-dir services --reload-dir tools
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s

  frontend:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    command: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501
    depends_on:
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: research_swarm
      POSTGRES_USER: swarm
      POSTGRES_PASSWORD: swarm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swarm -d research_swarm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  pg_data:
